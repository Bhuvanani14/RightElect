name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: |
        npm ci
        cd server && npm ci

    - name: Lint
      run: npm run lint

    - name: Build
      run: |
        npm run build
        cd server && npm run build

    - name: Smoke test (deployed)
      if: env.DEPLOYED_URL != ''
      env:
        DEPLOYED_URL: ${{ secrets.DEPLOYED_URL }}
      run: |
        echo "Testing deployed URL: $DEPLOYED_URL"
        curl -f $DEPLOYED_URL/ || (echo 'health check failed' && exit 1)
        curl -f $DEPLOYED_URL/api/metrics || echo 'metrics missing'
        echo 'Smoke tests passed'
