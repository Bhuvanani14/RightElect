steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/${_IMAGE}', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/${_IMAGE}']

  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        # Use helper script to construct --set-secrets flags if secrets exist and deploy
        bash ./scripts/cloudrun-deploy.sh "$PROJECT_ID" "${_IMAGE}" "${_SERVICE_NAME}" "${_REGION}" "${_SERVICE_ACCOUNT}"

images:
  - 'gcr.io/$PROJECT_ID/${_IMAGE}'

substitutions:
  _IMAGE: 'rightelect-server:$SHORT_SHA'
  _SERVICE_NAME: 'rightelect-server'
  _REGION: 'us-central1'
  _SERVICE_ACCOUNT: 'rightelect-sa@tidy-node-494313-j1.iam.gserviceaccount.com'

availableSecrets:
  secretManager:
    - versionName: 'projects/$PROJECT_ID/secrets/MAPS_API_KEY/versions/latest'
      env: 'MAPS_API_KEY'
    - versionName: 'projects/$PROJECT_ID/secrets/NEWS_API_KEY/versions/latest'
      env: 'NEWS_API_KEY'
    - versionName: 'projects/$PROJECT_ID/secrets/GENERATIVE_API_KEY/versions/latest'
      env: 'GENERATIVE_API_KEY'

timeout: '1200s'
